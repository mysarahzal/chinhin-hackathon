services:
  postgres:
    image: postgres:16-alpine
    container_name: bc4_postgres
    restart: unless-stopped
    ports:
      - "5433:5432"
    environment:
      POSTGRES_USER: bc4user
      POSTGRES_PASSWORD: bc4pass
      POSTGRES_DB: bc4_procurement
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U bc4user -d bc4_procurement"]
      interval: 5s
      timeout: 3s
      retries: 10

volumes:
  pgdata:
